services:
  # The Ingestor: continuously writes raw files
  ingestor:
    build:
      context: ../../
      dockerfile: Dockerfile.mission
    user: "root"
    command:
      - sh
      - -c
      - |
        mkdir -p /home/maknoon/data
        while true; do
          dd if=/dev/urandom of=/home/maknoon/data/file_$$(date +%s%N).bin bs=1K count=1
          sleep 1
        done
    volumes:
      - agility-data:/home/maknoon/data
    networks:
      - agility-net

  # The Transformer: Runs the MCP server AND a worker loop
  transformer:
    build:
      context: ../../
      dockerfile: Dockerfile.mission
    environment:
      - MAKNOON_AGENT_MODE=1
      - MAKNOON_PASSPHRASE=agility-pass
    user: "root"
    command:
      - sh
      - -c
      - |
        maknoon keygen --no-password -o transformer-id
        maknoon mcp --transport sse --address 0.0.0.0:8080 &
        mkdir -p /home/maknoon/data/encrypted
        while true; do
          for f in /home/maknoon/data/*.bin; do
            if [ -f "$$f" ]; then
              out="/home/maknoon/data/encrypted/$$(basename "$$f").makn"
              if [ ! -f "$$out" ]; then
                maknoon encrypt "$$f" -o "$$out" --passphrase "agility-pass" --quiet
                rm "$$f"
              fi
            fi
          done
          sleep 1
        done
    volumes:
      - agility-data:/home/maknoon/data
    networks:
      - agility-net

  # The Controller: triggers the agility migration via MCP SSE
  controller:
    build:
      context: ../../
      dockerfile: Dockerfile.mission
    command: sleep 3600
    networks:
      - agility-net

volumes:
  agility-data:

networks:
  agility-net:
    internal: true
