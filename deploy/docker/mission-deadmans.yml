services:
  # The Recovery Node
  recovery-node:
    build:
      context: ../../
      dockerfile: Dockerfile.mission
    environment:
      - MAKNOON_AGENT_MODE=1
      - MAKNOON_PASSPHRASE=quorum-pass
    user: "root"
    command: ["sh", "-c", "maknoon keygen --no-password -o recovery-id && sleep 3600"]
    networks:
      - quorum-net

  # 4 Guardians
  guardian-1:
    build:
      context: ../../
      dockerfile: Dockerfile.mission
    environment:
      - MAKNOON_AGENT_MODE=1
      - MAKNOON_PASSPHRASE=quorum-pass
    user: "root"
    command: ["sh", "-c", "maknoon keygen --no-password -o g1-id && sleep 3600"]
    networks:
      - quorum-net

  guardian-2:
    build:
      context: ../../
      dockerfile: Dockerfile.mission
    environment:
      - MAKNOON_AGENT_MODE=1
      - MAKNOON_PASSPHRASE=quorum-pass
    user: "root"
    command: ["sh", "-c", "maknoon keygen --no-password -o g2-id && sleep 3600"]
    networks:
      - quorum-net

  guardian-3:
    build:
      context: ../../
      dockerfile: Dockerfile.mission
    environment:
      - MAKNOON_AGENT_MODE=1
      - MAKNOON_PASSPHRASE=quorum-pass
    user: "root"
    command: ["sh", "-c", "maknoon keygen --no-password -o g3-id && sleep 3600"]
    networks:
      - quorum-net

  guardian-4:
    build:
      context: ../../
      dockerfile: Dockerfile.mission
    environment:
      - MAKNOON_AGENT_MODE=1
      - MAKNOON_PASSPHRASE=quorum-pass
    user: "root"
    command: ["sh", "-c", "maknoon keygen --no-password -o g4-id && sleep 3600"]
    networks:
      - quorum-net

networks:
  quorum-net:
    internal: true
