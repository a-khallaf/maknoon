services:
  # 1. The Service (Net-B)
  service:
    image: python:3.11-alpine
    working_dir: /www
    command: sh -c "echo 'Hello from Isolated Net-B' > index.html && python3 -m http.server 80"
    networks:
      - net-b

  # 2. Gateway-B (Net-B and Public-Mesh)
  gateway-b:
    build:
      context: ../../
      dockerfile: Dockerfile.mission
    environment:
      - MAKNOON_AGENT_MODE=1
      - MAKNOON_PASSPHRASE=bridge-pass
    user: "root"
    command: ["sh", "-c", "maknoon keygen --no-password -o gateway-b-id && maknoon tunnel listen --p2p --address service:80 --identity gateway-b-id --trace"]
    networks:
      - net-b
      - public-mesh
    depends_on:
      - service

  # 3. Gateway-A (Net-A and Public-Mesh)
  gateway-a:
    build:
      context: ../../
      dockerfile: Dockerfile.mission
    environment:
      - MAKNOON_AGENT_MODE=1
      - MAKNOON_PASSPHRASE=bridge-pass
    user: "root"
    # gateway-a will be started by the script once it knows gateway-b's address
    command: sleep 3600
    networks:
      - net-a
      - public-mesh

  # 4. The Client (Net-A)
  client:
    image: curlimages/curl:latest
    command: sleep 3600
    networks:
      - net-a

networks:
  net-a:
    internal: true
  net-b:
    internal: true
  public-mesh:
    internal: false
