services:
  # 1. The private service (Hidden from the main network)
  provider:
    image: python:3.11-alpine
    working_dir: /www
    command: python3 -m http.server 80
    networks:
      - internal-mesh
    # No ports exposed

  # 2. The Maknoon Gateway (Listens for P2P connections and forwards to 'provider')
  maknoon-gateway:
    build:
      context: ../../
      dockerfile: Dockerfile.mission
    environment:
      - MAKNOON_AGENT_MODE=1
      - MAKNOON_PASSPHRASE=mesh-pass
    user: "root"
    # Port 4000 for the tunnel listener, forwarding to provider:80
    command: sh -c "maknoon keygen --no-password -o gateway-id && maknoon tunnel listen --p2p --address provider:80 --identity gateway-id"
    networks:
      - internal-mesh
      - public-mesh
    depends_on:
      - provider

  # 3. The Maknoon Client (Local SOCKS5 proxy reaching out to Gateway)
  maknoon-client:
    build:
      context: ../../
      dockerfile: Dockerfile.mission
    environment:
      - MAKNOON_AGENT_MODE=1
      - MAKNOON_PASSPHRASE=mesh-pass
    command: sleep 3600
    networks:
      - public-mesh

networks:
  # Simulated private backend network
  internal-mesh:
    internal: true
  # Simulated public internet for P2P traffic
  public-mesh:
    internal: false
