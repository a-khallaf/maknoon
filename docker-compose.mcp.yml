services:
  target:
    image: nginx:alpine
    networks:
      tunnel-net:
        ipv4_address: 172.25.0.5

  mcp-gateway:
    build: .
    # Starts the Unified Binary in MCP SSE mode with PQC-TLS
    command: mcp --transport sse --address :8080
    ports:
      - "8080:8080" # MCP Control Plane (HTTPS/SSE)
      - "4433:4433/udp" # PQC Tunnel Data Plane
    networks:
      tunnel-net:
        ipv4_address: 172.25.0.10
    environment:
      - MAKNOON_PASSPHRASE=agent-secret-123
      - MAKNOON_AGENT_MODE=1

networks:
  tunnel-net:
    ipam:
      config:
        - subnet: 172.25.0.0/16
